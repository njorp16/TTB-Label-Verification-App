name: Live Checklist

on:
  workflow_dispatch:
    inputs:
      live_check_url:
        description: "Deployment base URL"
        required: true
        default: "https://ttb-label-verification-app-production.up.railway.app"

jobs:
  live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run live checklist
        run: uv run python scripts/live_checklist.py "${{ inputs.live_check_url }}" --latency-runs 5
